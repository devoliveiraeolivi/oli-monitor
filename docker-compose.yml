# Stack de monitoramento centralizada — Loki + Prometheus + Grafana + Alloy
# Roda via Portainer (Swarm) com Traefik na frente.
#
# Pré-requisitos:
#   - Traefik rodando na network_swarm_public
#   - CNAMEs: grafana.oliveiraeolivi.cloud, loki.oliveiraeolivi.cloud,
#             prometheus.oliveiraeolivi.cloud
#   - Gerar hash da senha Loki: htpasswd -nB loki-agent
#     e setar LOKI_BASIC_AUTH_USERS no .env do Portainer
#   - Gerar hash da senha Prometheus: htpasswd -nB prometheus-user
#     e setar PROMETHEUS_BASIC_AUTH_USERS no .env do Portainer
#
# Acesso:
#   Grafana:    https://grafana.oliveiraeolivi.cloud
#   Loki:       https://loki.oliveiraeolivi.cloud (basic auth, só Alloy)
#   Prometheus: https://prometheus.oliveiraeolivi.cloud (basic auth)

services:
  # ═══════════════════════════════════════════════════════════════
  # Loki — agregador de logs
  # ═══════════════════════════════════════════════════════════════
  loki:
    image: grafana/loki:${LOKI_VERSION:-3.6.7}
    volumes:
      - loki-data:/loki
    configs:
      - source: loki-config
        target: /etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - internal
      - network_swarm_public
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M
      labels:
        - "traefik.enable=true"
        # Router — HTTPS com basic auth (Alloy envia logs aqui)
        - "traefik.http.routers.loki.rule=Host(`loki.oliveiraeolivi.cloud`)"
        - "traefik.http.routers.loki.entrypoints=websecure"
        - "traefik.http.routers.loki.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.loki.middlewares=loki-auth"
        - "traefik.http.routers.loki.service=loki"
        # Service
        - "traefik.http.services.loki.loadbalancer.server.port=3100"
        # Middleware — basic auth (hash bcrypt gerado via htpasswd -nB)
        - "traefik.http.middlewares.loki-auth.basicauth.users=loki-agent:$$2y$$05$$.VF3Hf9k9pdUac0WDHKIQuebyfF5pcJqR9/l7ix2744Mm6Vxt90XC"

  # ═══════════════════════════════════════════════════════════════
  # Prometheus — metricas de performance e infra
  # Scrape: gateway APM, Alloy host metrics, Supabase (futuro)
  # ═══════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.3.0}
    volumes:
      - prometheus-data:/prometheus
    configs:
      - source: prometheus-config-v2
        target: /etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-remote-write-receiver"
    networks:
      - internal
      - network_swarm_public
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M
      labels:
        - "traefik.enable=true"
        # Router — HTTPS com basic auth
        - "traefik.http.routers.prometheus.rule=Host(`prometheus.oliveiraeolivi.cloud`)"
        - "traefik.http.routers.prometheus.entrypoints=websecure"
        - "traefik.http.routers.prometheus.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.prometheus.middlewares=prometheus-auth"
        - "traefik.http.routers.prometheus.service=prometheus"
        # Service
        - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
        # Middleware — basic auth (gerar via: htpasswd -nB prometheus-user)
        - "traefik.http.middlewares.prometheus-auth.basicauth.users=prometheus-user:$$2y$$05$$A/EO0Wr8FdrBomg0v7sstudRzOm/p.P91SEbh1KhibFdDnMRKxJU."

  # ═══════════════════════════════════════════════════════════════
  # Grafana — dashboards e alertas
  # ═══════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-12.4.0}
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://grafana.oliveiraeolivi.cloud
    volumes:
      - grafana-data:/var/lib/grafana
    configs:
      - source: grafana-datasources
        target: /etc/grafana/provisioning/datasources/ds.yaml
      - source: grafana-dashboards-provider
        target: /etc/grafana/provisioning/dashboards/dashboards.yaml
      - source: grafana-dashboard-oli-scraper-v4
        target: /etc/grafana/provisioning/dashboards/oli-scraper.json
      - source: grafana-dashboard-oli-indexer
        target: /etc/grafana/provisioning/dashboards/oli-indexer.json
    networks:
      - internal
      - network_swarm_public
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 256M
      labels:
        - "traefik.enable=true"
        # Router — HTTPS
        - "traefik.http.routers.grafana.rule=Host(`grafana.oliveiraeolivi.cloud`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.routers.grafana.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.grafana.service=grafana"
        # Service
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # ═══════════════════════════════════════════════════════════════
  # cAdvisor — metricas de containers Docker
  # CPU, RAM, rede, disco por container. Scrapado pelo Prometheus.
  # ═══════════════════════════════════════════════════════════════
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION:-v0.51.0}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - internal
    deploy:
      mode: global
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 128M

  # ═══════════════════════════════════════════════════════════════
  # Blackbox Exporter — probe HTTP/HTTPS de endpoints externos
  # Verifica disponibilidade end-to-end via Traefik.
  # ═══════════════════════════════════════════════════════════════
  blackbox:
    image: prom/blackbox-exporter:${BLACKBOX_VERSION:-v0.25.0}
    configs:
      - source: blackbox-config
        target: /etc/blackbox/config.yml
    command: --config.file=/etc/blackbox/config.yml
    networks:
      - internal
      - network_swarm_public
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 64M

  # ═══════════════════════════════════════════════════════════════
  # Alloy — coletor de logs local (containers neste host)
  # ═══════════════════════════════════════════════════════════════
  alloy:
    image: grafana/alloy:${ALLOY_VERSION:-v1.13.2}
    environment:
      ALLOY_DEPLOY_MODE: docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker:/var/lib/docker:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/rootfs:ro
    configs:
      - source: alloy-config-v2
        target: /etc/alloy/config.alloy
    command: >
      run
      --server.http.listen-addr=0.0.0.0:12345
      --storage.path=/var/lib/alloy/data
      /etc/alloy/config.alloy
    networks:
      - internal
    deploy:
      mode: global
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 256M

# ═══════════════════════════════════════════════════════════════
# Configs — injetados como arquivos nos containers
# ═══════════════════════════════════════════════════════════════
configs:
  loki-config:
    file: ./loki/loki-config.yaml
  prometheus-config-v2:
    file: ./prometheus/prometheus.yml
  blackbox-config:
    file: ./blackbox/config.yml
  alloy-config-v2:
    file: ./alloy/config.alloy
  grafana-datasources:
    file: ./grafana/datasources.yaml
  grafana-dashboards-provider:
    file: ./grafana/dashboards/dashboards.yaml
  grafana-dashboard-oli-scraper-v4:
    file: ./grafana/dashboards/oli-scraper.json
  grafana-dashboard-oli-indexer:
    file: ./grafana/dashboards/oli-indexer.json

volumes:
  loki-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  internal:
    driver: overlay
  network_swarm_public:
    external: true
    name: network_swarm_public