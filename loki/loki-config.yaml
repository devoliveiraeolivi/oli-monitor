# Loki config — filesystem storage, single instance
# Retenção: 30 dias. Ajuste conforme necessidade de disco.

auth_enabled: false

server:
  http_listen_port: 3100

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 720h   # 30 dias
  reject_old_samples: true
  reject_old_samples_max_age: 336h  # 14 dias (evita drop após restart longo do Alloy)

common:
  ring:
    instance_addr: 0.0.0.0
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: /loki

schema_config:
  configs:
    - from: "2020-05-15"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache
  filesystem:
    directory: /loki/chunks

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true
  compaction_interval: 10m
